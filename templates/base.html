<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Uni Job Tracker{% endblock %}</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e3e6ea;
    --text: #1f2430;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --green: #16a34a;
    --red: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 18px;
    margin: 0;
  }
  nav a {
    margin-left: 18px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
  nav a.active, nav a:hover { color: var(--accent); }
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px;
  }
  .flash {
    background: #eef4ff;
    border: 1px solid #c7dcff;
    color: #1e3a8a;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
  }
  .btn:hover { background: var(--accent-dark); }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  form.inline { display: inline; }
  .badge {
    font-size: 12px;
    background: #eef2ff;
    color: var(--accent-dark);
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 600;
  }
</style>
</head>
<body>
<header>
  <h1>🎓 Uni Job Tracker</h1>
  <nav>
    <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">Dashboard</a>
    <a href="{{ url_for('universities') }}" class="{{ 'active' if request.endpoint == 'universities' }}">Manage Universities</a>
    {% if session.get('is_admin') %}
      <form method="POST" action="{{ url_for('admin_logout') }}" class="inline" style="display:inline;">
        <button type="submit" style="background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; margin-left:18px;">Log out</button>
      </form>
    {% else %}
      <a href="{{ url_for('admin_login') }}">Admin Login</a>
    {% endif %}
  </nav>
</header>
<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}
        <div class="flash">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
