{% extends "base.html" %}
{% block title %}Admin Login - Uni Job Tracker{% endblock %}
{% block content %}
<h2 style="font-size:16px;">Admin Login</h2>
<p class="muted" style="margin-top:-8px;">Only needed to add or remove tracked universities. Anyone can browse the dashboard without logging in.</p>
<form method="POST" style="display:flex; gap:8px; max-width:360px;">
  <input type="password" name="password" placeholder="Password" required
         style="flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:6px;">
  <button class="btn" type="submit">Log in</button>
</form>
{% endblock %}
